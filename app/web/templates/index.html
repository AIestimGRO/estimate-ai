<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Estimate AI</title>
  <style>$styles</style>
</head>
<body>
  <main class="card">
    <h1>Estimate AI</h1>
    <p class="sub">Подбор аналогов и расчёт цен по смете</p>
    <form method="post" action="/run" enctype="multipart/form-data">
      <label>База аналогов (Excel .xlsx)
        <input type="file" name="catalog" accept=".xlsx" required>
      </label>
      <label>Смета (Excel .xlsx)
        <input type="file" name="estimate" accept=".xlsx" required>
      </label>
      <label>Региональный коэффициент
        <input type="text" name="coefficient" inputmode="decimal"
               placeholder="например 1.4 — или заполните ячейку D20 в смете">
      </label>
      <button type="submit">Обработать</button>
    </form>
    $message
    <p class="build">Writer: $build_stamp<br>Name_Exclusions: $macro_status</p>
  </main>
</body>
</html>
