<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Estimate AI</title>
  <style>$styles</style>
</head>
<body>
  <main class="card">
    <h1>Estimate AI</h1>
    <p class="sub">Подбор аналогов и расчёт цен по смете</p>
    <form method="post" action="/run" enctype="multipart/form-data">
      <label>База аналогов (Excel .xlsx, необязательно если загружена в БД)
        <input type="file" name="catalog" accept=".xlsx" $catalog_required>
      </label>
      <p class="muted">SQLite: $catalog_status</p>
      <label>Смета (Excel .xlsx)
        <input type="file" name="estimate" accept=".xlsx" required>
      </label>
      <button type="submit">Далее</button>
    </form>
    $message
    <a class="back" href="/admin">Админка</a>
    <p class="build">Writer: $build_stamp<br>Name_Exclusions: $macro_status</p>
  </main>
</body>
</html>
